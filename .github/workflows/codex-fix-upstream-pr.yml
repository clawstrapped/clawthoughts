name: Codex fix stuck upstream PR

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  codex-fix:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.event == 'pull_request'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Find associated PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_JSON=$(gh pr list \
            --state open \
            --json number,headRefName,baseRefName \
            --jq '.[] | select((.headRefName | startswith("upstream-main")) and .baseRefName=="main") | first')

          if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
            echo "No open upstream-main* -> main PR found"
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_HEAD=$(echo "$PR_JSON" | jq -r '.headRefName')

          echo "should_run=true" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_head=$PR_HEAD" >> $GITHUB_OUTPUT

      - name: Check out PR branch
        if: steps.pr.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.pr_head }}
          fetch-depth: 0

      - name: Set up Node
        if: steps.pr.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.pr.outputs.should_run == 'true'
        run: npm ci

      - name: Run Codex to fix CI
        if: steps.pr.outputs.should_run == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are fixing a failing upstream-sync PR in this repository.

            Context:
            - This PR merges upstream-main into main.
            - Required checks are version-sync and cli-smoke.
            - Make the minimum safe change needed to get the PR passing.
            - Do not disable tests, remove checks, or change workflow architecture.
            - Preserve upstream behavior unless a targeted compatibility fix is required.
            - Prefer small, reviewable edits.
            - After making changes, explain what you changed and why.

      - name: Commit Codex changes
        if: steps.pr.outputs.should_run == 'true'
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Codex: fix failing upstream sync PR"
          git push origin HEAD:${{ steps.pr.outputs.pr_head }}

      - name: Ask Codex for review on PR
        if: steps.pr.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ steps.pr.outputs.pr_number }} \
            --body "@codex review"
